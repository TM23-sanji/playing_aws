services:
  backend:
    build: ./backend
    expose:
      - "8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        awslogs-group: "todo-app"
        awslogs-region: "eu-north-1"
        tag: "{{.Name}}"

  frontend:
    build: ./frontend
    expose:
      - "3000"
    depends_on:
      - backend
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        awslogs-group: "todo-app"
        awslogs-region: "eu-north-1"
        tag: "{{.Name}}"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        awslogs-group: "todo-app"
        awslogs-region: "eu-north-1"
        tag: "{{.Name}}"

networks:
  default:
    enable_ipv6: true
    ipam:
      config:
        - subnet: "2001:db8:2::/64"
