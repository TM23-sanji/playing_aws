services:
  backend:
    build: ./backend
    network_mode: host
    environment:
      - DATABASE_URL=${DATABASE_URL}
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - API_PROXY_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
