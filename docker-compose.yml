services:
  backend:
    build: ./backend
    network_mode: host
    environment:
      - DATABASE_URL=${DATABASE_URL}
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        awslogs-group: "todo-app"
        awslogs-region: "eu-north-1"
        awslogs-stream: "backend"
  frontend:
    build: ./frontend
    network_mode: host
    environment:
      - API_PROXY_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        awslogs-group: "todo-app"
        awslogs-region: "eu-north-1"
        awslogs-stream: "frontend"
